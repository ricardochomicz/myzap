<div class="form-group" [formGroup]="form">
    <label [for]="field.name.id">{{field.name.label}}</label>
    <input type="text" class="form-control" [id]="field.name.id" formControlName="name">
    <field-error [field]="form.get('name')" [label]="field.name.label"></field-error>
</div>
<div class="form-group" [formGroup]="form">
    <label [for]="field.price.id">{{field.price.label}}</label>
    <input type="text" class="form-control" [id]="field.price.id" formControlName="price">
    <field-error [field]="form.get('price')" [label]="field.price.label"></field-error>
</div>
<div class="form-group" [formGroup]="form">
    <label for="description">Descrição</label>
    <textarea name="description" id="description" class="form-control" formControlName="description"></textarea>
</div>
<div class="form-group mt-4" [formGroup]="form" *ngIf="form.get('active')">
    <div class="form-check form-switch form-switch-md">
        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault"
            formControlName="active">
        <label class="form-check-label ms-2" for="flexSwitchCheckDefault"><strong>{{form.get('active').value ? 'Ativo' :
                'Inativo'}}</strong></label>
    </div>
</div>
