<form (submit)="submit()">
    <modal (onHide)="hideModal($event)">

        <h5 modal-title>Novo Produto</h5>
        <div modal-body>
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" class="form-control" id="name" name="name" required [(ngModel)]="product.name">
            </div>
            <div class="form-group">
                <label for="price">Valor</label>
                <input type="text" class="form-control" id="price" name="price" required [(ngModel)]="product.price">
            </div>
            <div class="form-group">
                <label for="description">Descrição</label>
                <textarea name="description" id="description" name="description" class="form-control" 
                [(ngModel)]="product.description"></textarea>
            </div>

        </div>
        <div modal-footer>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </modal>
</form>
