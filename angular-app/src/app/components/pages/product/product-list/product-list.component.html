<div class="card mt-4">
    
    <h5 class="card-header d-flex align-items-center">
        <i class="fas fa-layer-group me-2"></i> Produtos
        <div class="d-flex ms-auto">
            <button class="btn btn-dark btn-sm" (click)="showModalInsert()">
                <i class="fas fa-plus fa-lg"></i> Novo Produto
            </button>
        </div>
    </h5>
    <div class="card-body">
        
        <div class="table-responsive">
            <table class="table table-borderless">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Valor</th>
                        <th class="text-center">Ativo?</th>
                        <th>Criado em</th>
                        <th class="text-center" scope="col">Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let product of products">
                        <td>{{product.id}}</td>
                        <td>{{product.name}}</td>
                        <td>{{product.price | currency: 'BRL' }}</td>
                        <td class="text-center">
                            <i class="fas fa-2x"
                                [ngClass]="{'fa-toggle-on text-success': product.active, 'fa-toggle-off text-danger': !product.active}"></i>
                        </td>
                        <td>{{product.created_at}}</td>
                        <td class="d-flex flex-row justify-content-center">          
                            <a href="javascript:void(0)" class="btn btn-outline-primary btn-sm me-2"
                                (click)="showModalEdit(product.id)">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="javascript:void(0)" class="btn btn-outline-danger btn-sm me-2"
                                (click)="showModalDelete(product.id)">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                            <a href="javascript:void(0)" class="btn btn-outline-info btn-sm"
                                [routerLink]="['/product', product.id, 'categories']">
                                <i class="fas fa-layer-group"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<overlay [(show)]="showOverlay"><strong>Carregando Produtos</strong></overlay>
<product-new-modal (onSuccess)="onInsertSuccess($event)" (onError)="onInsertError($event)"></product-new-modal>

<product-edit-modal [productId]="productId" (onSuccess)="onEditSuccess($event)" (onError)="onEditError($event)">
</product-edit-modal>

<product-delete-modal [productId]="productId" (onSuccess)="onDeleteSuccess()" (onError)="onDeleteError($event)">
</product-delete-modal>
