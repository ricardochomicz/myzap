<div class="form-group" [formGroup]="form">
    <label for="product_id">Produto</label>
    <ng-select [items]="data[0]" bindLabel="name" bindValue="id" formControlName="product_id">
    </ng-select>
</div>

<div class="form-group" [formGroup]="form">
    <label [for]="field.amount.id">{{field.amount.label}}</label>
    <input type="number" name="amount" [id]="field.amount.id" class="form-control" formControlName="amount">
    <field-error [field]="form.get('amount')" [label]="field.amount.label"></field-error>
</div>
