<main class="form-signin w-100 m-auto" *ngIf="!authService.isAuth()">
    <form (submit)="login()">
        <img class="rounded mx-auto d-block mb-3" src="assets/images/whatsapp.png" alt="" width="72" height="72">
        <h1 class="h3 mb-3 fw-normal text-center">Login <b>MyZap</b></h1>

        <div class="form-floating">
            <input type="email" class="form-control" name="email" [(ngModel)]="credentials.email" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Seu E-mail</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control" name="password" [(ngModel)]="credentials.password" id="floatingPassword" placeholder="Password">
            <label for="floatingPassword">Sua Senha</label>
        </div>

        <div class="checkbox mb-3">
            <label>
                <input type="checkbox" value="remember-me"> Remember me
            </label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
        <p class="mt-5 mb-3 text-muted text-center">&copy; 2017–2022</p>
    </form>
</main>
