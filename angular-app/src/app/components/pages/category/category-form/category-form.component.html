<div class="form-group" [formGroup]="form">
    <label [for]="field.name.id">{{field.name.label}}</label>
    <input type="text" class="form-control" isInvalid formControlName="name" [id]="field.name.id">
    <field-error [field]="form.get('name')" 
                 [label]="field.name.label"
                 [messages]="field.name.validationMessage"></field-error>
</div>
<div class="form-group mt-4" [formGroup]="form" *ngIf="form.get('active')">
    <div class="form-check form-switch form-switch-md">
        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault"
            formControlName="active">
        <label class="form-check-label ms-2" for="flexSwitchCheckDefault"><strong>{{form.get('active').value ? 'Ativo' :
                'Inativo'}}</strong></label>
    </div>
</div>
