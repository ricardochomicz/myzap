<div class="form-group" [formGroup]="form">
    <label for="name">Nome</label>
    <input type="text" class="form-control" isInvalid id="name" 
        required formControlName="name">
        <field-error [field]="form.get('name')"></field-error>
</div>
<div class="form-group mt-4" [formGroup]="form" *ngIf="form.get('active')">
    <label class="switch">
        <input type="checkbox" name="active" formControlName="active">
        <span class="slider round"></span>
    </label>
</div>
